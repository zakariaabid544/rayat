<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Rayat - Monitoraggio Agricolo</title>
    <meta name="application-name" content="Rayat">
    <!-- PWA & Mobile Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#064e3b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Rayat">
    <meta name="format-detection" content="telephone=no">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="/assets/logo/logo-green.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <script defer data-domain="rayat.ma" src="https://plausible.io/js/script.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Chart.js removed as requested for lightweight app -->
    <link rel="stylesheet" href="./assets/css/public.css?v=1.1.5">
</head>

<body class="bg-gray-50">
    <div id="app"></div>
    <script src="./assets/js/public.js?v=1.1.5"></script>
    <!-- Subscription Expired Modal -->
    <div id="subscription-expired-modal" class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="rayat-modal-card bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl transform transition-all">
            <div class="flex justify-end mb-2">
                <button onclick="dismissSubscriptionExpiredModal()" aria-label="Chiudi popup abbonamento" class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500 hover:text-gray-700 transition text-xl leading-none">&times;</button>
            </div>
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl" style="filter: drop-shadow(0 4px 6px rgba(220,38,38,0.3));">⚠️</span>
            </div>
            <h2 data-i18n="subscriptionExpiredTitle" class="text-2xl font-black text-gray-800 tracking-tighter mb-2">Abbonamento Scaduto</h2>
            <p data-i18n="subscriptionExpiredText" class="text-gray-500 mb-6 leading-relaxed">Il tuo piano di monitoraggio e giunto al termine. Per continuare ad accedere ai dati dei tuoi sensori e ricevere avvisi agronomici in tempo reale, rinnova il tuo abbonamento.</p>
            
            <div class="bg-gray-50 rounded-2xl p-4 mb-6 border border-gray-100">
                <div class="text-3xl font-black text-green-600 mb-1">279 DH<span class="text-sm text-gray-400 font-normal">/mese</span></div>
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Rayat Smart Monitoring</div>
            </div>
            
            <button onclick="openSupportWhatsapp()" class="w-full flex items-center justify-center gap-2 bg-[#25D366] hover:bg-[#1ebd5a] text-white font-bold py-4 rounded-xl transition shadow-lg shadow-green-500/30">
                <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                <span data-i18n="subscriptionRenewWhatsapp">Rinnova su WhatsApp</span>
            </button>

            <button onclick="continueWithoutLogin()" data-i18n="continueWithoutLogin" class="w-full mt-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">
                Continua senza login
            </button>
            <button onclick="goToLogin()" data-i18n="backToLogin" class="mt-4 text-sm text-gray-500 font-bold hover:text-gray-700 transition">Torna al Login</button>
        </div>
    </div>
</body>

</html>
