<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" width="160" height="48">
  <!-- Wheat/leaf mark -->
  <g transform="translate(4, 4)">
    <!-- Stem -->
    <line x1="20" y1="40" x2="20" y2="10" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left leaves -->
    <path d="M20 34 Q10 30 8 22 Q14 26 20 28" fill="#C0C0C0" opacity="0.9"/>
    <path d="M20 26 Q9 20 10 11 Q16 17 20 20" fill="#C0C0C0" opacity="0.75"/>
    <!-- Right leaves -->
    <path d="M20 34 Q30 30 32 22 Q26 26 20 28" fill="#C0C0C0" opacity="0.9"/>
    <path d="M20 26 Q31 20 30 11 Q24 17 20 20" fill="#C0C0C0" opacity="0.75"/>
    <!-- Grain head -->
    <ellipse cx="20" cy="8" rx="3.5" ry="5" fill="#C0C0C0"/>
  </g>
  <!-- RAYAT wordmark -->
  <text x="52" y="32" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="24" letter-spacing="3" fill="#C0C0C0">RAYAT</text>
</svg>
